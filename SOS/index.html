<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.4, maximum-scale=3.0, minimum-scale=1.0">
<title>SOS Eletrônica</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #0d0b1e;
  --bg-card: #1a1535;
  --bg-card2: #221c47;
  --accent: #2bbbd1;
  --accent2: #ff3b3b;
  --accent3: #f7c94b;
  --text: #ffffff;
  --text-muted: #a09cc0;
  --radius: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Press Start 2P', monospace;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== SCANLINE EFFECT ===== */
body::before {
  content: '';
  pointer-events: none;
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.07) 3px,
    rgba(0,0,0,0.07) 4px
  );
  z-index: 9999;
}

/* ===== TELA INICIAL ===== */
#menu {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 18px;
  padding: 20px;
  position: relative;
  background-color: var(--bg-dark);
  background-image: url('SEU-FUNDO.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* overlay sobre a foto de fundo */
#menu::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(43,187,209,0.22) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 70%, rgba(255,59,59,0.18) 0%, transparent 60%),
    rgba(13, 11, 30, 0.60);
  pointer-events: none;
  z-index: 0;
}

#menu > * { position: relative; z-index: 1; }



.logo-box {
  text-align: center;
  margin-bottom: 10px;
}

.logo-box .emoji {
  font-size: 52px;
  display: block;
  margin-bottom: 12px;
  filter: drop-shadow(0 0 16px #2bbbd1);
  animation: pulse 2.5s infinite;
}

@keyframes pulse {
  0%,100% { filter: drop-shadow(0 0 10px #2bbbd1); }
  50% { filter: drop-shadow(0 0 28px #2bbbd1) drop-shadow(0 0 48px #2bbbd199); }
}

h1 {
  font-size: clamp(26px, 5vw, 36px);
  text-shadow: 3px 3px #ff3b3b, 6px 6px rgba(255,59,59,0.3);
  letter-spacing: 2px;
  line-height: 1.5;
  text-align: center;
}

.subtitle {
  font-size: clamp(15px, 2vw, 15px);
  color: var(--accent);
  margin-top: 8px;
  letter-spacing: 3px;
  text-align: center;
}

.botao {
  width: 90%;
  max-width: 320px;
  padding: 18px 20px;
  background: var(--bg-card2);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(8px, 2.5vw, 11px);
  color: var(--text);
  text-align: center;
  cursor: pointer;
  box-shadow: 0 6px 0 #1b7f8f, var(--shadow);
  transition: transform 0.1s, box-shadow 0.1s;
  position: relative;
  overflow: hidden;
  letter-spacing: 1px;
}

.botao::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(43,187,209,0.12) 0%, transparent 60%);
}

.botao:hover { transform: translateY(2px); box-shadow: 0 4px 0 #1b7f8f; }
.botao:active { transform: translateY(5px); box-shadow: 0 1px 0 #1b7f8f; }

.botao.red {
  border-color: var(--accent2);
  box-shadow: 0 6px 0 #8f1b1b, var(--shadow);
}
.botao.red:hover { box-shadow: 0 4px 0 #8f1b1b; }
.botao.red:active { box-shadow: 0 1px 0 #8f1b1b; }

/* ===== CABEÇALHO GLOBAL ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--bg-card);
  border-bottom: 2px solid rgba(255,255,255,0.06);
  position: sticky;
  top: 0;
  z-index: 100;
}

.page-header h2 {
  font-size: clamp(9px, 3vw, 13px);
  letter-spacing: 1px;
  color: var(--accent);
}

.btn-back {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 2vw, 9px);
  color: var(--text-muted);
  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.btn-back:hover { color: var(--text); border-color: var(--text); }

/* ===== CALENDÁRIO ===== */
#calendarioContainer {
  display: none;
  min-height: 100vh;
  background: var(--bg-dark);
  font-family: 'Poppins', sans-serif;
}

.cal-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 16px 20px;
}

.cal-nav button {
  background: var(--bg-card2);
  border: none;
  color: var(--text);
  font-size: 18px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.2s;
}
.cal-nav button:hover { background: var(--accent); }

.mes-label {
  font-family: 'Poppins', sans-serif;
  font-size: clamp(16px, 5vw, 22px);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: capitalize;
  color: var(--text);
}

.dias-semana {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  padding: 0 12px;
  margin-bottom: 6px;
}

.dia-semana {
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  color: var(--text-muted);
  padding: 6px 0;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.calendario {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  padding: 0 12px 100px;
}

.dia {
  background: var(--bg-card);
  border-radius: 10px;
  padding: 6px 5px;
  min-height: clamp(70px, 14vw, 90px);
  font-family: 'Poppins', sans-serif;
  font-size: clamp(12px, 3vw, 15px);
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
  overflow: hidden;
}

.dia:hover { border-color: var(--accent); background: var(--bg-card2); }

.dia.hoje {
  border-color: var(--accent3);
  background: rgba(247,201,75,0.08);
}

.dia.hoje .num-dia { color: var(--accent3); }

.dia.vazio { background: transparent; cursor: default; border: none; }

.num-dia {
  display: block;
  color: var(--text);
  margin-bottom: 4px;
}

.evento-tag {
  display: block;
  margin-top: 3px;
  padding: 2px 4px;
  border-radius: 4px;
  font-size: clamp(6px, 1.5vw, 8px);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #fff;
  font-family: 'Poppins', sans-serif;
}

/* ===== FAB ===== */
.fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  background: var(--accent2);
  border: none;
  border-radius: 50%;
  width: 58px;
  height: 58px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 6px 0 #8f1b1b, 0 0 20px rgba(255,59,59,0.4);
  transition: transform 0.1s, box-shadow 0.1s;
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.fab:hover { transform: scale(1.07); }
.fab:active { transform: translateY(4px) scale(0.97); box-shadow: 0 2px 0 #8f1b1b; }

/* ===== POPUP ===== */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 500;
  padding: 16px;
  backdrop-filter: blur(4px);
}

.popup-content {
  background: var(--bg-card);
  padding: 24px;
  border-radius: 20px;
  width: 100%;
  max-width: 380px;
  border: 1.5px solid rgba(43,187,209,0.3);
  box-shadow: 0 0 40px rgba(43,187,209,0.1);
  font-family: 'Poppins', sans-serif;
}

.popup-content h3 {
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 16px;
}

.form-group {
  margin-bottom: 14px;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

select, textarea, input[type="text"] {
  width: 100%;
  background: var(--bg-card2);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}
select:focus, textarea:focus, input:focus { border-color: var(--accent); }
select option { background: var(--bg-card2); }
textarea { min-height: 80px; resize: vertical; }

.popup-btns {
  display: flex;
  gap: 10px;
  margin-top: 6px;
}

.btn-salvar, .btn-fechar {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 700;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-salvar { background: var(--accent); color: #000; }
.btn-salvar:hover { opacity: 0.85; }
.btn-fechar { background: rgba(255,255,255,0.08); color: var(--text); }
.btn-fechar:hover { background: rgba(255,255,255,0.14); }

/* ===== OUTRAS INFORMAÇÕES ===== */
#infoContainer {
  display: none;
  min-height: 100vh;
  background: var(--bg-dark);
}

.info-list {
  padding: 16px 16px 100px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.info-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1.5px solid rgba(255,255,255,0.07);
  overflow: hidden;
  transition: border-color 0.2s;
}
.info-card:hover { border-color: rgba(43,187,209,0.3); }

.info-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
}

.info-card-title {
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

.info-card-tag {
  font-family: 'Poppins', sans-serif;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  background: rgba(43,187,209,0.15);
  color: var(--accent);
}

.info-card-body {
  padding: 0 16px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
  border-top: 0px solid rgba(255,255,255,0.06);
}

.info-card-body.open {
  max-height: 400px;
  padding: 14px 16px;
  border-top-width: 1px;
}

.info-card-body p { white-space: pre-wrap; }

.info-card-footer {
  display: flex;
  justify-content: flex-end;
  padding: 8px 16px 14px;
}

.btn-del {
  background: none;
  border: 1px solid rgba(255,59,59,0.3);
  color: #ff6b6b;
  border-radius: 6px;
  padding: 4px 10px;
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-del:hover { background: rgba(255,59,59,0.1); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  line-height: 2;
}
.empty-state .icon { font-size: 48px; display: block; margin-bottom: 16px; }

/* Popup de VISUALIZAÇÃO do dia */
.popup-ver-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.popup-ver-header h3 {
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  margin: 0;
}

.btn-add-evento {
  background: var(--accent2);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 12px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-add-evento:hover { opacity: 0.82; }

.evento-item {
  background: var(--bg-card2);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 10px;
  border-left: 4px solid #666;
}

.evento-item-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.evento-item-tipo {
  font-family: 'Poppins', sans-serif;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: rgba(255,255,255,0.12);
  padding: 2px 8px;
  border-radius: 20px;
  color: #fff;
}

.evento-item-disc {
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
}

.evento-item-desc {
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-top: 2px;
}

.evento-item-del {
  float: right;
  background: none;
  border: none;
  color: #ff6b6b;
  font-size: 14px;
  cursor: pointer;
  opacity: 0.6;
  padding: 0 0 0 8px;
  line-height: 1;
  transition: opacity 0.15s;
}
.evento-item-del:hover { opacity: 1; }

.sem-eventos {
  text-align: center;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  color: var(--text-muted);
  padding: 24px 0;
}

/* Popup de info */
#popupInfo .popup-content h3 { color: var(--accent3); }

/* ===== RESPONSIVO ===== */
@media (max-width: 400px) {
  .dia { padding: 4px 3px; min-height: 60px; }
  .num-dia { font-size: 12px; }
  .evento-tag { font-size: 6px; }
  .calendario { gap: 3px; padding: 0 8px 100px; }
  .dias-semana { gap: 3px; padding: 0 8px; }
}
</style>
</head>
<body>

<!-- ===== MENU ===== -->
<div id="menu">
  <div class="logo-box">
    <span class="emoji">⚡</span>
    <h1>S.O.S ELETRÔNICA</h1>
    <p class="subtitle">&gt;&gt; SISTEMA DE ORGANIZAÇÃO &lt;&lt;</p>
  </div>
  <button class="botao" onclick="abrirCalendario()">📅 CALENDÁRIO</button>
  <button class="botao red" onclick="abrirInfo()">📋 OUTRAS INFORMAÇÕES</button>
</div>

<!-- ===== CALENDÁRIO ===== -->
<div id="calendarioContainer">
  <div class="page-header">
    <h2>📅 CALENDÁRIO</h2>
    <button class="btn-back" onclick="voltarMenu()">← VOLTAR</button>
  </div>

  <div class="cal-nav">
    <button onclick="mudarMes(-1)">◀</button>
    <span class="mes-label" id="mesLabel"></span>
    <button onclick="mudarMes(1)">▶</button>
  </div>

  <div class="dias-semana">
    <div class="dia-semana">Dom</div>
    <div class="dia-semana">Seg</div>
    <div class="dia-semana">Ter</div>
    <div class="dia-semana">Qua</div>
    <div class="dia-semana">Qui</div>
    <div class="dia-semana">Sex</div>
    <div class="dia-semana">Sáb</div>
  </div>

  <div class="calendario" id="calendario"></div>
</div>

<!-- FAB global -->
<button class="fab" id="fabBtn" onclick="onFabClick()">+</button>

<!-- POPUP Calendário -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h3 id="popupData">Adicionar evento</h3>

    <div class="form-group">
      <label>Tipo</label>
      <select id="tipo">
        <option>Prova</option>
        <option>Atividade</option>
        <option>Trabalho</option>
        <option>Simulado</option>
        <option>Projeto</option>
      </select>
    </div>

    <div class="form-group">
      <label>Disciplina</label>
      <select id="disciplina">
        <option>Potência</option>
        <option>Manutenção</option>
        <option>Automação</option>
        <option>Fundamentos da Eletricidade Industrial</option>
        <option>Português</option>
        <option>Inglês</option>
        <option>Geografia</option>
        <option>História</option>
        <option>Filosofia/Sociologia</option>
        <option>Física</option>
        <option>Química</option>
        <option>Biologia</option>
        <option>Matemática</option>
      </select>
    </div>

    <div class="form-group">
      <label>Descrição</label>
      <textarea id="desc" placeholder="Detalhes do evento..."></textarea>
    </div>

    <div class="popup-btns">
      <button class="btn-salvar" onclick="salvarEvento()">Salvar</button>
      <button class="btn-fechar" onclick="fecharPopup('popup')">Fechar</button>
    </div>
  </div>
</div>

<!-- ===== OUTRAS INFORMAÇÕES ===== -->
<div id="infoContainer">
  <div class="page-header">
    <h2>📋 INFORMAÇÕES</h2>
    <button class="btn-back" onclick="voltarMenu()">← VOLTAR</button>
  </div>

  <div class="info-list" id="infoList"></div>
</div>

<!-- POPUP VISUALIZAR DIA -->
<div id="popupVer" class="popup">
  <div class="popup-content">
    <div class="popup-ver-header">
      <h3 id="popupVerData">Dia</h3>
      <button class="btn-add-evento" onclick="abrirAdicionarDoDia()">+ Adicionar</button>
    </div>
    <div id="popupVerBody"></div>
    <div class="popup-btns" style="margin-top:4px">
      <button class="btn-fechar" style="flex:1" onclick="fecharPopup('popupVer')">Fechar</button>
    </div>
  </div>
</div>

<!-- POPUP Info -->
<div id="popupInfo" class="popup">
  <div class="popup-content">
    <h3>Nova informação</h3>

    <div class="form-group">
      <label>Título</label>
      <input type="text" id="infoTitulo" placeholder="Ex: E-mail Prof. João">
    </div>

    <div class="form-group">
      <label>Categoria</label>
      <select id="infoCategoria">
        <option>E-mail</option>
        <option>Classroom</option>
        <option>Links</option>
        <option>Avisos</option>
        <option>Outros</option>
      </select>
    </div>

    <div class="form-group">
      <label>Conteúdo</label>
      <textarea id="infoConteudo" placeholder="Email, número, link, observações..."></textarea>
    </div>

    <div class="popup-btns">
      <button class="btn-salvar" onclick="salvarInfo()">Salvar</button>
      <button class="btn-fechar" onclick="fecharPopup('popupInfo')">Fechar</button>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let eventos = JSON.parse(localStorage.getItem("eventos_v2")) || {};
const infosDefault = [
  {
    titulo: "E-mails dos Professores",
    categoria: "E-mail",
    conteudo: "Adicione aqui os e-mails dos professores.\nEx:\nProf. João - joao@escola.com\nProf. Maria - maria@escola.com"
  },
  {
    titulo: "Códigos do Google Classroom",
    categoria: "Links",
    conteudo: "Adicione aqui os códigos de cada turma.\nEx:\nPotência - abc123\nManutenção - xyz789"
  }
];
let infos = JSON.parse(localStorage.getItem("infos_v2"));
if (!infos) {
  infos = infosDefault;
  localStorage.setItem("infos_v2", JSON.stringify(infos));
}
let dataSelecionada = "";
let telaAtual = "menu"; // "menu" | "calendario" | "info"
let mesAtual = new Date().getMonth();
let anoAtual = new Date().getFullYear();

const CORES = {
  "Potência":"#1e88e5","Manutenção":"#42a5f5","Automação":"#1565c0",
  "Fundamentos da Eletricidade Industrial":"#5c6bc0","Português":"#f9a825",
  "Inglês":"#ffd54f","Geografia":"#8e24aa","História":"#6a1b9a",
  "Filosofia/Sociologia":"#ab47bc","Física":"#43a047","Química":"#2e7d32",
  "Biologia":"#66bb6a","Matemática":"#ec407a"
};

// ===== NAVEGAÇÃO =====
function voltarMenu() {
  document.getElementById("menu").style.display = "flex";
  document.getElementById("calendarioContainer").style.display = "none";
  document.getElementById("infoContainer").style.display = "none";
  document.getElementById("fabBtn").style.display = "none";
  telaAtual = "menu";
}

function abrirCalendario() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("calendarioContainer").style.display = "block";
  document.getElementById("fabBtn").style.display = "flex";
  telaAtual = "calendario";
  renderCalendario();
}

function abrirInfo() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("infoContainer").style.display = "block";
  document.getElementById("fabBtn").style.display = "flex";
  telaAtual = "info";
  renderInfos();
}

// ===== FAB =====
function onFabClick() {
  if (telaAtual === "calendario") {
    dataSelecionada = formatar(new Date());
    document.getElementById("popupData").textContent = "Evento — " + formatarBonito(dataSelecionada);
    document.getElementById("popup").style.display = "flex";
  } else if (telaAtual === "info") {
    document.getElementById("popupInfo").style.display = "flex";
  }
}

function fecharPopup(id) {
  document.getElementById(id).style.display = "none";
}

// ===== CALENDÁRIO =====
function mudarMes(delta) {
  mesAtual += delta;
  if (mesAtual > 11) { mesAtual = 0; anoAtual++; }
  if (mesAtual < 0) { mesAtual = 11; anoAtual--; }
  renderCalendario();
}

function renderCalendario() {
  const cal = document.getElementById("calendario");
  cal.innerHTML = "";

  const hoje = new Date();
  const nomeMes = new Date(anoAtual, mesAtual, 1)
    .toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
  document.getElementById("mesLabel").textContent =
    nomeMes.charAt(0).toUpperCase() + nomeMes.slice(1);

  const primeiroDia = new Date(anoAtual, mesAtual, 1).getDay();
  const totalDias = new Date(anoAtual, mesAtual + 1, 0).getDate();

  for (let i = 0; i < primeiroDia; i++) {
    cal.innerHTML += `<div class="dia vazio"></div>`;
  }

  for (let d = 1; d <= totalDias; d++) {
    const dataStr = formatar(new Date(anoAtual, mesAtual, d));
    const isHoje = (d === hoje.getDate() && mesAtual === hoje.getMonth() && anoAtual === hoje.getFullYear());

    let eventosTags = "";
    if (eventos[dataStr]) {
      eventos[dataStr].forEach(e => {
        const cor = CORES[e.disc] || "#666";
        const label = e.disc.length > 8 ? e.disc.substring(0, 7) + "…" : e.disc;
        eventosTags += `<span class="evento-tag" style="background:${cor}">${e.tipo.charAt(0)} ${label}</span>`;
      });
    }

    cal.innerHTML += `
      <div class="dia${isHoje ? " hoje" : ""}" onclick="verDia('${dataStr}')">
        <span class="num-dia" onclick="event.stopPropagation(); abrirPopupDia('${dataStr}')">${d}</span>
        ${eventosTags}
      </div>`;
  }
}

function verDia(data) {
  dataSelecionada = data;
  document.getElementById("popupVerData").textContent = formatarBonito(data);
  renderPopupVer(data);
  document.getElementById("popupVer").style.display = "flex";
}

function renderPopupVer(data) {
  const body = document.getElementById("popupVerBody");
  const evs = eventos[data] || [];
  if (evs.length === 0) {
    body.innerHTML = `<div class="sem-eventos">Nenhum evento neste dia.</div>`;
    return;
  }
  body.innerHTML = evs.map((e, idx) => {
    const cor = CORES[e.disc] || "#666";
    const descHtml = e.desc ? '<div class="evento-item-desc">' + escapeHtml(e.desc) + '</div>' : "";
    return '<div class="evento-item" style="border-left-color:' + cor + '">'
      + '<button class="evento-item-del" onclick="deletarEvento(\'' + data + '\',' + idx + ')">✕</button>'
      + '<div class="evento-item-top">'
      + '<span class="evento-item-tipo">' + escapeHtml(e.tipo) + '</span>'
      + '<span class="evento-item-disc">' + escapeHtml(e.disc) + '</span>'
      + '</div>'
      + descHtml
      + '</div>';
  }).join("");
}

function abrirAdicionarDoDia() {
  fecharPopup("popupVer");
  abrirPopupDia(dataSelecionada);
}

function deletarEvento(data, idx) {
  if (!eventos[data]) return;
  eventos[data].splice(idx, 1);
  if (eventos[data].length === 0) delete eventos[data];
  localStorage.setItem("eventos_v2", JSON.stringify(eventos));
  renderPopupVer(data);
  renderCalendario();
}

function abrirPopupDia(data) {
  dataSelecionada = data;
  document.getElementById("popupData").textContent = "Evento — " + formatarBonito(data);
  document.getElementById("popup").style.display = "flex";
}

function salvarEvento() {
  const tipo = document.getElementById("tipo").value;
  const disc = document.getElementById("disciplina").value;
  const desc = document.getElementById("desc").value;

  if (!eventos[dataSelecionada]) eventos[dataSelecionada] = [];
  eventos[dataSelecionada].push({ tipo, disc, desc });
  localStorage.setItem("eventos_v2", JSON.stringify(eventos));

  document.getElementById("desc").value = "";
  fecharPopup("popup");
  renderCalendario();
}

// ===== INFOS =====
function renderInfos() {
  const list = document.getElementById("infoList");
  if (infos.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="icon">📭</span>Nenhuma informação ainda.<br>Toque em <strong>+</strong> para adicionar.</div>`;
    return;
  }

  list.innerHTML = infos.map((item, idx) => `
    <div class="info-card">
      <div class="info-card-header" onclick="toggleInfo(${idx})">
        <span class="info-card-title">${escapeHtml(item.titulo)}</span>
        <span class="info-card-tag">${escapeHtml(item.categoria)}</span>
      </div>
      <div class="info-card-body" id="info-body-${idx}">
        <p>${escapeHtml(item.conteudo)}</p>
        <div class="info-card-footer">
          <button class="btn-del" onclick="deletarInfo(${idx})">🗑 Remover</button>
        </div>
      </div>
    </div>
  `).join("");
}

function toggleInfo(idx) {
  const body = document.getElementById(`info-body-${idx}`);
  body.classList.toggle("open");
}

function salvarInfo() {
  const titulo = document.getElementById("infoTitulo").value.trim();
  const categoria = document.getElementById("infoCategoria").value;
  const conteudo = document.getElementById("infoConteudo").value.trim();

  if (!titulo || !conteudo) return alert("Preencha título e conteúdo.");

  infos.push({ titulo, categoria, conteudo });
  localStorage.setItem("infos_v2", JSON.stringify(infos));

  document.getElementById("infoTitulo").value = "";
  document.getElementById("infoConteudo").value = "";
  fecharPopup("popupInfo");
  renderInfos();
}

function deletarInfo(idx) {
  if (!confirm("Remover esta informação?")) return;
  infos.splice(idx, 1);
  localStorage.setItem("infos_v2", JSON.stringify(infos));
  renderInfos();
}

// ===== UTILS =====
function formatar(data) {
  return data.toISOString().split("T")[0];
}

function formatarBonito(dataStr) {
  const [a, m, d] = dataStr.split("-");
  const meses = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  return `${parseInt(d)} de ${meses[parseInt(m)-1]} de ${a}`;
}

function escapeHtml(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
